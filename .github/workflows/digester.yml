name: DocDigester2MD

on:
  push:
    paths:
      - "input/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run DocDigester2MD
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python DocDigester2MD.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/ processed.json

          if git diff --staged --quiet; then
            echo "No changes to commit — nothing new was processed."
            exit 0
          fi

          # Build commit message from list of newly generated .md files
          CHANGED=$(git diff --staged --name-only \
            | grep -E '^output/.*\.md$' \
            | sed 's|output/||' \
            | paste -sd ', ' -)

          if [ -n "$CHANGED" ]; then
            MSG="chore: digest ${CHANGED}"
          else
            MSG="chore: update digester state"
          fi

          git commit -m "$MSG"
          git push
